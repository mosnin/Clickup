name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      # Placeholder publishable values so `next build` can prerender; no
      # real secrets are needed (or used) at build time.
      - run: npm run build
        env:
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_ZXhhbXBsZS5jbGVyay5hY2NvdW50cy5kZXYk
          CLERK_SECRET_KEY: sk_test_placeholder
          NEXT_PUBLIC_CONVEX_URL: https://placeholder-000.convex.cloud
